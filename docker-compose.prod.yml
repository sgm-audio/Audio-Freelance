# Production overrides — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
version: "3.9"

services:
  backend:
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - CHROMA_HOST=http://chromadb:8000
      - LOG_LEVEL=WARNING
    # Don't re-seed in production
    command: uv run python main.py

  frontend:
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ollama:
    restart: unless-stopped
    # CPU-only fallback — remove nvidia device reservation for non-GPU hosts
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  chromadb:
    restart: unless-stopped
