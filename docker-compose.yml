version: "3.9"

# ── Production override: docker compose -f docker-compose.yml -f docker-compose.prod.yml up ──
# Uses pre-built GHCR images instead of local builds.

services:
  # ── Embedding service (optional) ──
  ollama:
    image: ollama/ollama:latest
    profiles: ["full"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── Vector database ──
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma

  # ── FastAPI backend ──
  backend:
    image: ghcr.io/sgm-audio/audio-freelance/backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - CHROMA_HOST=http://chromadb:8000
      - EMBEDDING_MODEL=nomic-embed-text
      - PREFERRED_NICHES=plugin_dev,reaper_scripts,rust_audio,audio_ml,game_audio_dev
      - MIN_RATE_CAD=3000
      - HOURLY_FLOOR_CAD=150
    depends_on:
      - chromadb
    volumes:
      - lead_data:/app/leads/data
    command: >
      sh -c "uv run python scripts/seed.py && uv run python main.py"

  # ── Next.js frontend ──
  frontend:
    image: ghcr.io/sgm-audio/audio-freelance/frontend:latest
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - API_HOST=backend
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - backend

  # ── SGM Outreach Engine (OUTREACH_BUILD_SPEC) — profile: outreach ──
  outreach:
    profiles: ["outreach"]
    build:
      context: .
      dockerfile: packages/cli/Dockerfile
    environment:
      - SGM_OUTREACH_DB=/data/outreach.sqlite
      - NODE_ENV=production
    volumes:
      - outreach_data:/data
      - ./inbox:/app/inbox:ro
      - ./config:/app/config:ro
    command: ["node", "packages/cli/dist/bin.js", "status"]

  n8n:
    profiles: ["outreach"]
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_PORT=5678
      - GENERIC_TIMEZONE=America/Vancouver
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  ollama_data:
  chroma_data:
  lead_data:
  outreach_data:
  n8n_data:
