# fly.toml — Audio-Freelance deployment config
# Deploy: fly deploy
#
# IMPORTANT: Change `app` to your Fly.io app name before first deploy.
# Run: fly apps create audio-freelance  (or pick your own name)

app = "audio-freelance"
primary_region = "sea"  # Seattle — closest to Vancouver

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  HOST = "0.0.0.0"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
